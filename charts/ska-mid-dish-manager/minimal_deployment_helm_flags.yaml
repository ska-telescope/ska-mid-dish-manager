# deploy dish-manager with only ds-manager, spfrx and spf sim with default instance 001
global:
  minikube: true
  operator: true

ska-mid-dish-ds-manager:
  enabled: true
  dishstructuremanager:
    image:
      registry: registry.gitlab.com/ska-telescope/mid-dish/ska-mid-dish-ds-manager
      image: ska-mid-dish-ds-manager
      tag: 8.0.5-dev.ccaafdf88
      pullPolicy: IfNotPresent

ska-tango-base:
  enabled: true

ska-mid-dish-simulators:
  enabled: true
  deviceServers:
    spfdevice:
      enabled: true
    spfrxdevice:
      enabled: true
  dsOpcuaSimulator:
    enabled: true

  dishsimulators:
    image:
      registry: registry.gitlab.com/ska-telescope/mid-dish/ska-mid-dish-simulators
      image: ska-mid-dish-simulators
      tag:  5.8.1-dev.c5aaf2bb6
      pullPolicy: IfNotPresent

